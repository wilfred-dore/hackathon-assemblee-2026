name: Déploiement démo (GitHub Pages)
# Pages activé (Source = GitHub Actions). Redéploiement (retry transitoire, build local OK).

# Construit un site 100 % statique depuis le POC (moteur pré-calculé par le
# pipeline Python) et le publie sur GitHub Pages. Aucun backend n'est déployé.
# Prérequis : Settings → Pages → Source = « GitHub Actions ».

on:
  push:
    branches: [main]          # Pages ne sert qu'un site -> on déploie depuis main
    paths:
      - 'poc/**'
      - 'presentation/**'
      - 'schema-site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Construire le site statique
        run: |
          pip install httpx
          python poc/build_static.py
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Construire le deck Slidev (-> site/presentation)
        working-directory: presentation
        run: |
          npm install
          npx slidev build slides.md --base /hackathon-assemblee-2026/presentation/ --out "$GITHUB_WORKSPACE/site/presentation"
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # active GitHub Pages si pas encore fait (évite « Get Pages site failed »)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # GitHub Pages échoue parfois en transitoire (« Deployment failed, try again
      # later ») alors que le build est bon -> jusqu'à 3 tentatives, avec pause.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - id: deploy2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 20
      - id: deploy3
        if: steps.deployment.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
