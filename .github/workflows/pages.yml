name: Deploy schema site to Pages (manuel)

# Publie schema-site/ (SchemaSpy scrubbé + JSON/DBML) sur GitHub Pages.
# ⚠️ François a AUSSI un déploiement Pages (deploy-pages.yml, l'app). Un seul site
# Pages est possible -> ce workflow est MANUEL uniquement pour ne pas se battre
# avec le sien. À unifier : app de François à la racine + schéma sous /schema.
# Activer : Settings -> Pages -> Source = GitHub Actions.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: schema-site
      - id: deployment
        uses: actions/deploy-pages@v4
