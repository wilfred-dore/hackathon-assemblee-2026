<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wilfred Doré</title>
<style>
  :root{ --blue-france:#000091; --red:#e1000f; --ink:#161616; --mut:#666; }
  *{ box-sizing:border-box; }
  body{ margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center;
        justify-content:center; gap:14px; font:16px system-ui,"Segoe UI",sans-serif; color:var(--ink);
        background:#f5f5fe; padding:24px; }
  .tri{ height:6px; width:120px; border-radius:2px;
        background:linear-gradient(90deg,var(--blue-france) 33%,#fff 33% 66%,var(--red) 66%); border:1px solid #eee; }
  h1{ margin:0; font-size:1.6rem; } p{ color:var(--mut); margin:0; }
  a.btn{ margin-top:10px; padding:14px 22px; background:var(--blue-france); color:#fff;
         text-decoration:none; border-radius:8px; font-weight:600; }
  a.btn:hover{ background:#1212ff; }
</style>
</head>
<body>
  <div class="tri"></div>
  <h1>Wilfred Doré</h1>
  <p>Projets</p>
  <a class="btn" href="https://wilfred-dore.github.io/hackathon-assemblee-2026/">
    Hackathon Assemblée nationale 2026 — Le Rapporteur →
  </a>
</body>
</html>
